<!-- GSAP Animation Code -->
<script>

gsap.registerPlugin(ScrollTrigger);

  gsap.from(".box", {
      x: 200,
      y: 100,
      rotation: 360,
     //  duration: 2,         
     // When we use scrub, the duration property is ignored, because the animation duration is determined by the scroll distance and speed.
      scrollTrigger: {
        trigger: ".box",
        scroller: "body",     // This specifies the container that will be scrolled. In this case, it's the main element. If we don't specify this, it will default to the window object.
        start: "top 80%",
        end: "top 30%",
        markers: true,
        scrub: true,
     //    pin: true          // This will pin the trigger element in place while the scroll trigger is active. The element will remain fixed in its position until the end of the scroll trigger is reached.
      }
    });
   

    gsap.from("#text-animate", {
      x: "100%",
      ease: "linear",
      scrollTrigger: {
        trigger: "#text-animate",
        start: "top 80%",
        end: "top 60%",
        markers: true,
        scrub: 1,        // adds a delay - for smoother feeling
      }
    });


</script>

<!-- Scroll Trigger Explanation -->

<!-- 

     1. Plugin Setup & Register
     ScrollTrigger is a plugin of GSAP, so we must include and register it.
          <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
          <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

          <script>
               gsap.registerPlugin(ScrollTrigger);          // This registers the scroll trigger plugin with GSAP, without registering, Scroll Trigger won't work.
          </script>

     2. 'trigger' property in scrollTrigger:
     It defines which element controls thee scroll animation. When the trigger element enters the viewport, the animation will start. We can also specify the trigger element's position in the viewport using the 'start' and 'end' property. For example, if we set 'start: "top center"', the animation will start when the top of the trigger element reaches the center of the viewport. If we set 'end: "bottom top"', the animation will end when the bottom of the trigger element reaches the top of the viewport.
     Example:
          gsap.to(".box", {
               x: 300,
               scrollTrigger: {
                    trigger: ".box"
               }
          });
     
     3. start & end property in scrollTrigger:
     'start' controls when the animation starts and 'end' controls when the animation ends. 
     Syntax:
          start: "element-position viewport-position"
          end: "element-position viewport-position"
     
          We can use the following keywords for element-position:
               - top: the top of the trigger element
               - center: the center of the trigger element
               - bottom: the bottom of the trigger element
               -also, percentage values can be used to specify the position of the trigger element, for example, "20%" would mean 20% down from the top of the trigger element.
          
     Example:
          gsap.to(".box", {
               x: 300,
               scrollTrigger: {
                    trigger: ".box",
                    start: "top 80%",             // animation starts when the top of the trigger element reaches the 80% of the viewport
                    end: "bottom top"             // animation ends when the bottom of the trigger element reaches the top of the viewport
               }
          });

     4. markers property in scrollTrigger:
     Shows the visual guides on the screen to indicate the start and end points of the scroll trigger.
     Example:
          gsap.to(".box", {
               x: 300,
               scrollTrigger: {
                    trigger: ".box",
                    start: "top 80%",
                    end: "bottom top",
                    markers: true            // Shows markers on the screen to indicate the start and end points of the scroll trigger
               }
          });

     5. toggleActions property in scrollTrigger:
     It controls what happens on scroll events. There are 4 events in order - onEnter, onLeave, onEnterBack, onLeaveBack. Each event can have one of the following actions:
          - play: plays the animation
          - pause: pauses the animation
          - resume: resumes the animation from where it was paused
          - reverse: reverses the animation
          - restart: restarts the animation from the beginning
          - reset: resets the animation to its initial state
          - complete: completes the animation immediately
          - none: does nothing
     
     Syntax:
          toggleActions: "onEnter onLeave onEnterBack onLeaveBack"
          toggleActions: "play none resume none"    
     

     6. once:
     When this property is set to true, the animation will only play once. The animation will not repeat on scroll back after.
     example:
          gsap.to(".box", {
               x: 300,
               scrollTrigger: {
                    trigger: ".box",
                    start: "top 80%",
                    end: "bottom top",
                    toggleActions: "play none none none",
                    once: true            // The animation will only play once, it won't repeat on scroll back after.
               }
          });

     7. scrub:
     This property links the animation progress to the scrollbar position. When scrub is set to true, the animation will play in sync with the scrollbar movement. The animation will play forward when scrolling down and reverse when scrolling up. We can also specify a number value for scrub, which will create a delay between the scrollbar movement and the animation. 
     For example, 
     if we set scrub: 1, there will be a 1-second delay between the scrollbar movement and the animation.
     
     Example:
          gsap.to(".box", {
               x: 300,
               scrollTrigger: {
                    trigger: ".box",
                    start: "top 80%",
                    end: "bottom top",
                    scrub: true            // The animation will play in sync with the scrollbar movement.
               }
          });

     8.pin:
     This property fixes an element during the scroll. When pin is set to true, the trigger element will be pinned in place while the scroll trigger is active. The element will remain fixed in its position until the end of the scroll trigger is reached.
     Example:
          gsap.to(".box", {
               x: 300,
               scrollTrigger: {
                    trigger: ".box",
                    start: "top 80%",
                    end: "bottom top",
                    pin: true            // The trigger element will be pinned in place while the scroll trigger is active.
               }
          });
-->





<!-- Advanced Scroll Trigger  -->

<!-- 

     1. Timeline + ScrollTrigger:
     Instead of multiple animations, controll everything with one timeline and one scroll trigger.
     Example:
          let tl = gsap.timeline({
               scrollTrigger: {
                    trigger: ".section",
                    start: "top 80%",
                    end: "top 20%",
                    scrub: 1,
               }
          });

          tl.from(".box", { x: -200, opacity: 0 })
            .to(".box", { rotation: 360 })
            .to(".box", { scale: 1.5 });

     2. Multiple triggers:
     Different animations for different sections. Each element reacts to its own scroll position.
     Example:
          gsap.to(".box1", {
               x: 300,
               scrollTrigger: {
                    trigger: ".box1",           // Each element has its own trigger, so they will react to their own scroll position.
                    start: "top 80%",
                    end: "top 20%",
                    scrub: 1,
               }
          });

          gsap.to(".box2", {
               x: 300,
               scrollTrigger: {
                    trigger: ".box2",         // Each element has its own trigger, so they will react to their own scroll position.
                    start: "top 80%",
                    end: "top 20%",
                    scrub: 1,
               }
          });

     3. Animation per Element (Loop):
     If we have multiple elements with the same class and we want to animate them individually based on their own scroll position, we can use the 'each' method to create a scroll trigger for each element.
     Example:
          gsap.utils.toArray(".box").forEach(box => {
               gsap.to(box, {
                    x: 300,
                    scrollTrigger: {
                         trigger: box,           // Each element has its own trigger, so they will react to their own scroll position.
                         start: "top 80%",
                         end: "top 20%",
                         scrub: 1,
                    }
               });
          });
     -- Its ideal for cards, lists, grids, etc. where we have multiple similar elements and we want to animate them individually based on their own scroll position.
     -- This way, we don't have to write separate scroll trigger code for each element, we

     4. Horizontal Scrolling:
     We can also create horizontal scrolling effects with ScrollTrigger by animating the x property instead of y. This can create a horizontal scrolling effect where elements move horizontally as we scroll down the page.
     Example:
          gsap.to(".box", {
               x: 500,                 // Animating the x property for horizontal movement.
               scrollTrigger: {
                    trigger: ".box",
                    start: "top 80%",
                    end: "top 20%",
                    scrub: 1,
               }
          });

     5. ScrollTrigger with Pinning and Scrubbing:
     We can combine pinning and scrubbing to create a more interactive scroll experience. When an element is pinned, it stays fixed in place while the scroll trigger is active. By adding scrub, we can link the animation progress to the scrollbar position, creating a more dynamic and engaging scroll experience.
     Example:
          gsap.to(".box", {
               x: 300,
               scrollTrigger: {
                    trigger: ".box",
                    start: "top 80%",
                    end: "top 20%",
                    scrub: 1,            // Links the animation progress to the scrollbar position.
                    pin: true           // Pins the element in place while the scroll trigger is active.
               }
     
     6. Parallax Scrolling:
     We can create a parallax scrolling effect by animating differnt elements at different speeds. For example, we can animate the background to move slower than the foreground elements, creating a sense of depth and immersion.
     Example:
          gsap.to(".background", {
               y: 100,             // Background moves slower
               scrollTrigger: {
                    trigger: ".section",
                    start: "top 80%",
                    end: "top 20%",
                    scrub: 1,
               }
          });

          gsap.to(".foreground", {
               y: 200,             // Foreground moves faster
               scrollTrigger: {
                    trigger: ".section",
                    start: "top 80%",
                    end: "top 20%",
                    scrub: 1,
               }

     
     7. Snapping:
     We can use the snap property to create a snapping effect, where the scroll position snaps to specific points. This can be useful for creating a more controlled and polished scroll experience.
     Example:
          gsap.to(".box", {
               x: 300,
               scrollTrigger: {
                    trigger: ".box",
                    start: "top 80%",
                    end: "top 20%",
                    scrub: 1,
                    snap: {
                         snapTo: [0, 0.5, 1],   // Snap to the start, middle, and end of the animation.
                         duration: { min: 0.2, max: 0.5 }, // Duration of the snap animation.
                         ease: "power1.inOut"   // Easing for the snap animation.
                    }
               }
          });
     
     






-->

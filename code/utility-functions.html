<!-- Utility Functions Explanation -->

<!-- 
     1. GSAP Utility Functions:
     GSAP provides several utility functions that can be used to perform common tasks related to animations. Some of the commonly used utility functions include:
          - gsap.utils.toArray(): this function converts anything into a proper array.
          Example:
               let items = document.querySelectorAll(".box");         // This returns a NodeList, not an array.
               items = gsap.utils.toArray(items);                     // Now it's a proper array.
               now,
               items.forEach(item => {
                  gsap.to(item, { 
                    x: 100, 
                    duration: 1 
                  });
               });

          - gsap.utils.random(x, y): This function generates a random number between a specified minimum (x) and maximum (y) value. It can be used to create random animations or to add variability to your animations.
         Example:
               gsap.to(".box", {
                    x: gsap.utils.random(100, 500)
               });
          
          - gsap.utils.wrap(): This function wraps a value within a specified range. It is often used to create looping animations or to ensure that values stay within certain limits.

          - gsap.utils.interpolate(): This function interpolates between two values based on a given progress value (between 0 and 1). It is useful for creating smooth transitions between different states.
          
          - gsap.utils.snap(): This function snaps a value to the nearest increment based on a specified grid size. It can be used to create animations that align with a grid or to ensure that values snap to specific points.      
   
-->

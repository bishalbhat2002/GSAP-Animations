<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>GSAP + Tailwind css</title>
     <link rel="stylesheet" href="../style.css">
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>

     <!-- Navbar code -->
     <nav 
          id="navbar"
          class="bg-orange-200 p-4 w-90 z-3 absolute top-0 left-0 right-0 h-screen overflow-y-auto hide-navbar"
     >
     <div 
     class="flex gap-2 justify-between items-center sticky top-0">
          <span class="text-2xl font-bold bg-white p-2 px-4 text-center rounded-sm md:w-full">
               GSAP code practice
          </span>
          <button 
          id="hide-navbar-btn"
          class="bg-white text-xl inline-block h-10 w-10 rounded-full hover:bg-gray-200 md:hidden" 
          >❌</button>
     </div>

     <!-- Nav list -->
     <ul class="mt-4 flex flex-col gap-2" id="navlinks">
          <!-- <li class="p-2 hover:bg-gray-200 rounded"><a class="block" href="/">Home</a></li> -->
     </ul>

     </nav>
     
     <!-- Navbar show button -->
     <button 
          id="show-navbar-btn"
          class="bg-green-300 text-xl z-1 inline-block h-10 w-10 rounded-full hover:bg-green-700 hover:scale-102 hover:text-white transition active:scale-99 absolute top-5 left-5" id="nav-open-btn"
     >☰</button>


     <!-- Main section for code.... -->
     <main class="bg-green-100 min-h-screen p-4">
          <h1 class="bg-green-300 text-center p-2 rounded text-2xl font-bold text-zinc-700">Text Animation SVG</h1>
     </main>   

     




</body>
<script src="navlinks.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js" integrity="sha512-NcZdtrT77bJr4STcmsGAESr06BYGE8woZdSdEgqnpyqac7sugNO+Tr4bGwGF3MsnEkGKhU2KL2xh6Ec+BqsaHA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js" integrity="sha512-P2IDYZfqSwjcSjX0BKeNhwRUH8zRPGlgcWl5n6gBLzdi4Y5/0O4zaXrtO4K9TZK6Hn1BenYpKowuCavNandERg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="../script.js"></script>
</html>

<!-- Plugins Explanation -->

<!-- 
     GSAP Plugins:
     They give extra powers to GSAP, allowing you to create more complex and powerful animations. Some popular plugins include:
     
     1. ScrollTrigger: 
     This plugin allows you to create scroll-based animations. You can trigger animations when an element enters the viewport, or based on the scroll position.

     2. Draggable:
     This plugin allows you to make any element draggable. You can also create throw animations, where the element continues to move after being released, based on the velocity of the drag.

     3. MotionPathPlugin:
     This plugin allows you to animate an element along a custom path defined by an SVG or a set of coordinates.

     4. Observer:
     This plugin allows you to observe various user interactions, such as mouse movements, touch events, and scroll events, and trigger animations based on those interactions.

     5. SplitText:
     This plugin allows you to split text into individual characters, words, or lines, and animate them separately for more dynamic text animations.

     6. CustomEase:
     This plugin allows you to create custom easing functions for your animations, giving you more control over the timing and feel of your animations.

     7. Flip:
     This plugin allows you to create complex layout transitions by animating the changes in position, size, and rotation of elements when they are added, removed, or rearranged in the DOM.

     8. TextPlugin:
     This plugin allows you to animate the text content of an element, including changing the text, animating the text color, and more.

-->

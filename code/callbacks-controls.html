<!-- Callbacks and Controls Explanation -->

<!-- 
     1. Callbacks in GSAP:
     Callbacks are the functions that run automatically at different times of an animation. They allow you to execute code at specific points during the animation lifecycle. The common callbacks in GSAP include:
          - onStart: This callback is triggered when the animation starts.
          - onUpdate: This callback is triggered every time the animation updates (e.g., on each frame).
          - onComplete: This callback is triggered when the animation completes.
          - onRepeat: This callback is triggered each time the animation repeats (if it has a repeat property).
          - onReverseComplete: This callback is triggered when a reversed animation completes.
          - onInterrupt: This callback is triggered when an animation is interrupted (Ex: by another animation or user interaction).
          - onKill: This callback is triggered when an animation is killed (stopped and removed from the timeline).
          - onPause: This callback is triggered when an animation is paused.
          - onResume: This callback is triggered when a paused animation is resumed.
          - onReverse: This callback is triggered when an animation is reversed.
          - onStartParams, onUpdateParams, onCompleteParams, etc.: These allow you to pass parameters to the respective callbacks.
     Example usage:

          gsap.to(".box", {
               x: 100,
               duration: 2,
               onStart: () => console.log("Animation started!"),
               onUpdate: () => console.log("Animation updated!"),
               onComplete: () => console.log("Animation completed!"),
          });

     2. Controls in GSAP:
     Controls refer to the methods and properties that allow us to manipulate and control the animation after it has been created. Some of the common controls include:
          - play(): Starts or resumes the animation.
          - pause(): Pauses the animation.
          - resume(): Resumes a paused animation.
          - reverse(): Reverses the direction of the animation.
          - restart(): Restarts the animation from the beginning.
          - kill(): Stops the animation and removes it from the timeline.
          - timeScale(value): Changes the speed of the animation (e.g., timeScale(2) will make it run twice as fast).
          - progress(value): Sets or gets the progress of the animation (0 to 1).
          - repeat(value): Sets the number of times the animation should repeat.
          - repeatDelay(value): Sets the delay between repeats.
          - yoyo(value): If true, the animation will reverse on every alternate repeat.
     
     Example usage:
          first Save animation:
               let anim = gsap.to(".box", {
                    x: 300,
                    duration: 2,
                    paused: true        // Initially animation is in paused state
               });

          Then we can control it using the saved reference:
               anim.play();          // Start the animation
               anim.pause();         // Pause the animation
               anim.resume();        // Resume the animation
               anim.reverse();       // Reverse the animation
               anim.restart();       // Restart the animation
               anim.kill();          // Stop and remove the animation
               anim.timeScale(2);    // Speed up the animation
               anim.progress(0.5);   // Jump to the middle of the animation
               anim.repeat(2);       // Repeat the animation twice
               anim.yoyo(true);     // Enable yoyo effect for repeats



-->
